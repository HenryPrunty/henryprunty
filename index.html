<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Henry Prunty Architecture</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="left-col">
            <div class="nav-group">
                <a href="index.html" class="logo">Henry Prunty Architecture</a>
                <div class="nav-links">
                    <a href="projects.html">Projects</a>
                    <a href="bio.html">Bio</a>
                </div>
            </div>
            <a href="mailto:henryprunty2006@gmail.com" class="contact-info">henryprunty2006@gmail.com</a>
        </div>

        <div class="right-col">
            <div class="slideshow-container">
                <img class="slide active" src="images/brandyperspective1.pdf" alt="1">
                <img class="slide" src="https://via.placeholder.com/800x1200" alt="2">
                <img class="slide" src="https://via.placeholder.com/1000x1000" alt="3">
            </div>
        </div>
    </div>

    <script>
        let current = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 6000);
    </script>
</body>
</html>
